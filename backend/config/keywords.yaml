# ICT-avainsanat (suomi + englanti) — linjassa YTJ/kaupparekisterin tyypillisen sanaston kanssa.
# exclude_* = ei-ICT -yritykset (poistetaan tuloksista).
# Muokkaa tarpeen mukaan — tulokset ovat suosituksia.

fuzzy_threshold: 88
partial_ratio_weight: 0.92

# Poissulun fuzzy (hieman herkempi kuin ICT-osumat)
exclude_fuzzy_threshold: 90
exclude_partial_ratio_weight: 0.92

# Missä kentissä exclude-termejä verrataan (ei www-osoitetta — väärät osumat)
exclude_match_fields:
  - business_line
  - name
  - all_names

weights:
  name: 0.38
  business_line: 0.34
  extra: 0.23
  website: 0.05

# TOL 2008 — ICT-painotteiset jaottelut (koodi alkaa näin)
tol_ict_prefixes:
  - "62"
  - "63"
  - "26"
  - "95"

# TOL-prefiksit jotka tiputetaan kokonaan (ravintola, leipomo, rakennus…)
# Tarkista organisaatiosi tarpeisiin — liian lyhyt prefiksi voi poistaa liikaa.
exclude_tol_prefixes:
  - "561"   # ravintola, ruokapalvelu (56.x)
  - "562"
  - "563"
  - "1071"  # leivät, leipomo
  - "1072"
  - "1073"
  - "41"    # talon- ja kerrostalorakentaminen (41.x)
  - "42"    # maa- ja vesirakentaminen
  - "43"    # erikoisrakentaminen
  - "49"    # maantiekuljetus (ei ICT)
  - "50"    # vesikuljetus
  - "51"    # ilmakuljetus
  - "52"    # varastointi, kuljetusta tukevat toiminnot
  - "55"    # majoitus (hotellit)

# Sanat jotka viittaavat vahvasti ei-ICT -toimintaan (nimi tai virallinen toimiala)
